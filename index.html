<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethel | The Universal AI Encyclopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-black tracking-tight text-slate-900">Æthel</h1>
    <p class="text-slate-500 font-medium">The Global Standard for Adaptive Intelligence.</p>
  </header>

  <main class="w-full max-w-2xl bg-white rounded-2xl shadow-md p-8">
    <h2 class="text-xl font-semibold text-slate-800 mb-4">Search &amp; Master</h2>

    <div class="flex gap-3 mb-6">
      <input
        id="topicInput"
        type="text"
        placeholder="Enter a topic to master..."
        class="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400"
      />
      <button
        id="searchBtn"
        class="bg-slate-900 text-white font-semibold px-5 py-2 rounded-lg hover:bg-slate-700 transition"
      >
        Generate Lesson
      </button>
    </div>

    <div id="status" class="text-sm text-slate-400 mb-4 hidden">Generating lesson, please wait...</div>

    <div id="lessonOutput" class="hidden">
      <h3 class="text-lg font-bold text-slate-800 mb-2" id="lessonTitle"></h3>
      <div id="lessonContent" class="prose prose-slate max-w-none text-slate-700 whitespace-pre-wrap"></div>
      <p class="mt-4 text-xs text-slate-400" id="lessonAttribution"></p>
    </div>

    <div id="errorOutput" class="hidden text-red-500 text-sm"></div>
  </main>

  <script>
    const searchBtn = document.getElementById('searchBtn');
    const topicInput = document.getElementById('topicInput');
    const status = document.getElementById('status');
    const lessonOutput = document.getElementById('lessonOutput');
    const lessonTitle = document.getElementById('lessonTitle');
    const lessonContent = document.getElementById('lessonContent');
    const lessonAttribution = document.getElementById('lessonAttribution');
    const errorOutput = document.getElementById('errorOutput');

    searchBtn.addEventListener('click', async () => {
      const topic = topicInput.value.trim();
      if (!topic) {
        errorOutput.textContent = 'Please enter a topic before generating a lesson.';
        errorOutput.classList.remove('hidden');
        return;
      }

      status.classList.remove('hidden');
      lessonOutput.classList.add('hidden');
      errorOutput.classList.add('hidden');
      errorOutput.textContent = '';
      searchBtn.disabled = true;

      try {
        const response = await fetch('/generate-lesson', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || 'Unknown error');
        }

        const data = await response.json();
        lessonTitle.textContent = data.topic;
        lessonContent.textContent = data.lesson;
        lessonAttribution.textContent = 'Powered by ' + data.model_attribution;
        lessonOutput.classList.remove('hidden');
      } catch (err) {
        errorOutput.textContent = 'Error: ' + err.message;
        errorOutput.classList.remove('hidden');
      } finally {
        status.classList.add('hidden');
        searchBtn.disabled = false;
      }
    });

    topicInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchBtn.click();
    });
  </script>

</body>
</html>
